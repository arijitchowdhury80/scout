name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check scout/ tests/
      - run: ruff format --check scout/ tests/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: python -m pyright scout/

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: playwright install chromium --with-deps
      - run: python -c "from crawl4ai import AsyncWebCrawler; print('ok')"
      - run: python -m pytest tests/unit/ -v --tb=short

  integration-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: playwright install chromium --with-deps
      - run: python -c "from crawl4ai import AsyncWebCrawler; print('ok')"
      - run: python -m pytest tests/integration/ -v --tb=short -m integration

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile -t scout:ci .
