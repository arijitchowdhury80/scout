name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ruff
      - run: ruff check scout/ tests/ scripts/
      - run: ruff format --check scout/ tests/ scripts/

  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: python -m pyright scout/

  secret-scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install detect-secrets
      - run: |
          detect-secrets-hook --baseline .secrets.baseline --no-verify \
            --exclude-files '(^dist/|^validation-output/|^scout-runs/|^\.pytest_cache/|^\.ruff_cache/)' \
            $(git ls-files)

  launch-readiness:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python scripts/launch_readiness_check.py
      - run: python scripts/launch_readiness_check.py --json

  dependency-audit:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: pip install pip-audit
      - run: python -m pip_audit --local

  unit-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: playwright install chromium --with-deps
      - run: python -c "from crawl4ai import AsyncWebCrawler; print('ok')"
      - run: python -m pytest tests/unit/ -v --tb=short

  package-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: python -m pip install --upgrade pip build
      - run: python -m build
      - run: python -m venv /tmp/scout-wheel-smoke
      - run: /tmp/scout-wheel-smoke/bin/python -m pip install dist/scout_web-0.1.0-py3-none-any.whl
      - run: /tmp/scout-wheel-smoke/bin/python -c "import scout; print('import-ok')"
      - run: /tmp/scout-wheel-smoke/bin/scout --help

  integration-tests:
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install ".[dev]"
      - run: playwright install chromium --with-deps
      - run: python -c "from crawl4ai import AsyncWebCrawler; print('ok')"
      - run: python -m pytest tests/integration/ -v --tb=short -m integration

  docker-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - run: docker build -f docker/Dockerfile -t scout:ci .
      - run: |
          container_id=$(docker run -d --rm -p 18421:8421 \
            -e SCOUT_API_KEY=dev-key \
            -e SCOUT_WORKDIR=/data/runs \
            -e DB_PATH=/data/scout.db \
            scout:ci)
          cleanup() { docker rm -f "$container_id" >/dev/null 2>&1 || true; }
          trap cleanup EXIT
          for i in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:18421/health >/tmp/scout-health.json; then
              break
            fi
            sleep 1
            if [ "$i" = "30" ]; then
              docker logs "$container_id" >&2
              exit 1
            fi
          done
          curl -fsS http://127.0.0.1:18421/
          curl -fsS http://127.0.0.1:18421/status
          curl -fsS http://127.0.0.1:18421/styles.css
