services:
  scout:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8421:8421"
    env_file:
      - ../.env
    # Playwright/Chromium requires sufficient shared memory to avoid browser crashes
    shm_size: '1gb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8421/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
