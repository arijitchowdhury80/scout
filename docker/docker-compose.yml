services:
  scout:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: scout
    ports:
      - "127.0.0.1:8421:8421"
    env_file:
      - ../.env
    environment:
      - SCOUT_WORKDIR=/data/runs
      - DB_PATH=/data/scout.db
      - HOSTED_ACCOUNT_DB_PATH=/data/hosted_accounts.sqlite
    volumes:
      - scout-data:/data
    shm_size: '1gb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8421/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  scout-data:
