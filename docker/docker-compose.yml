services:
  scout:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    ports:
      - "8421:8421"
    env_file:
      - ../.env
    environment:
      - SCOUT_API_KEY=${SCOUT_API_KEY:-dev-key}
      - LLM_API_KEY=${LLM_API_KEY:-}
      - SCOUT_WORKDIR=/data/runs
      - DB_PATH=/data/scout.db
      - HOSTED_ACCOUNT_DB_PATH=/data/hosted_accounts.sqlite
      - SCOUT_PUBLIC_HOSTED_ONLY=${SCOUT_PUBLIC_HOSTED_ONLY:-false}
      - HOSTED_RATE_LIMIT_MAX_REQUESTS=${HOSTED_RATE_LIMIT_MAX_REQUESTS:-60}
      - HOSTED_RATE_LIMIT_WINDOW_SECONDS=${HOSTED_RATE_LIMIT_WINDOW_SECONDS:-60}
    volumes:
      - scout-data:/data
    shm_size: '1gb'
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8421/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s

volumes:
  scout-data:
